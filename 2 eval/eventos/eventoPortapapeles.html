<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eventos de Portapapeles</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    textarea {
      width: 300px;
      height: 100px;
      font-size: 16px;
      padding: 10px;
    }

    #log {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      height: 200px;
      overflow-y: auto;
      background: #f9f9f9;
    }

    .mensaje {
      margin-bottom: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Prueba de Eventos de Portapapeles</h1>
  <p>Escribe algo en el área de texto y prueba copiar, cortar o pegar.</p>

  <textarea id="areaTexto" placeholder="Escribe aquí..."></textarea>

  <div id="log"></div>

  <script>
    const areaTexto = document.getElementById("areaTexto");
    const log = document.getElementById("log");

    function mostrarMensaje(texto) {
      const div = document.createElement("div");
      div.classList.add("mensaje");
      div.textContent = texto;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    // Evento copy
    areaTexto.addEventListener("copy", (event) => {
      mostrarMensaje("Texto copiado");
    });

    // Evento cut
    areaTexto.addEventListener("cut", (event) => {
      mostrarMensaje("Texto cortado");
    });

    // Evento paste
    areaTexto.addEventListener("paste", (event) => {
      const textoPegado = event.clipboardData.getData("text");
      mostrarMensaje("Texto pegado: " + textoPegado);
    });
  </script>

</body>
</html>
